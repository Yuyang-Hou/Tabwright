<!doctype html>
<html>
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tabwright</title>
    <link rel="stylesheet" href="./options.css" />
    <script type="module" src="./options.ts"></script>
  </head>
  <body>
    <main class="app-shell">
      <header class="toolbar">
        <div class="brand-block">
          <div class="brand-mark" aria-hidden="true">
            <img src="../icons/icon-black-32.png" alt="" />
          </div>
          <div>
            <h1 data-i18n="app_title">Tabwright</h1>
            <p data-i18n="app_subtitle">Local browser automation cockpit</p>
          </div>
        </div>

        <div class="toolbar-actions">
          <label class="search-field">
            <span class="visually-hidden" data-i18n="search_label">Search</span>
            <input
              id="search-input"
              type="search"
              autocomplete="off"
              data-i18n-placeholder="search_capabilities_placeholder"
              placeholder="Filter Tabwright Skills"
            />
          </label>

          <label class="status-filter-field">
            <span class="visually-hidden" data-i18n="filter_status_label">Filter by status</span>
            <select id="status-filter" aria-label="Filter by status" data-i18n-aria-label="filter_status_label">
              <option value="all" data-i18n="filter_status_all">All statuses</option>
              <option value="ready" data-i18n="filter_status_ready">Ready</option>
              <option value="attention" data-i18n="filter_status_attention">Needs attention</option>
              <option value="disabled" data-i18n="filter_status_disabled">Disabled</option>
            </select>
          </label>

          <div class="status-pill" aria-live="polite">
            <span class="status-dot" aria-hidden="true"></span>
            <span id="status-text" data-i18n="status_loading_capabilities">Loading Tabwright Skills...</span>
          </div>

          <button
            id="refresh-button"
            class="icon-button"
            type="button"
            title="Refresh"
            data-i18n-title="refresh_button"
            aria-label="Refresh"
            data-i18n-aria-label="refresh_button"
          >
            <span aria-hidden="true">↻</span>
          </button>

          <div
            class="language-switch"
            role="group"
            aria-label="Language switch"
            data-i18n-aria-label="language_switch_aria_label"
          >
            <button
              class="language-button active"
              data-language="en"
              type="button"
              aria-pressed="true"
              data-i18n="language_en"
            >
              English
            </button>
            <button
              class="language-button"
              data-language="zh_CN"
              type="button"
              aria-pressed="false"
              data-i18n="language_zh_cn"
            >
              中文
            </button>
          </div>
        </div>
      </header>

      <section id="relay-review-warning" class="relay-review-warning" role="status" aria-live="polite" hidden>
        <div>
          <strong id="relay-review-warning-title" data-i18n="relay_review_warning_title"
            >Saved data is temporarily unavailable</strong
          >
          <p id="relay-review-warning-text"></p>
        </div>
        <code id="relay-review-warning-command">npm install -g tabwright@latest<br />tabwright session list</code>
      </section>

      <section class="workspace">
        <aside class="collection-panel">
          <header class="collection-header">
            <p class="eyebrow" id="view-eyebrow" data-i18n="capabilities_eyebrow">Agent Skills</p>
            <h2 id="view-title" data-i18n="capabilities_heading">Tabwright Skills</h2>
            <p id="view-description" data-i18n="capabilities_description">
              See installed Agent Skills and their safe local Tabwright runtime state.
            </p>
            <p id="skills-summary" class="collection-summary" aria-live="polite"></p>
          </header>

          <section id="skills-view" class="list-view">
            <div id="skills-list" class="list-body"></div>
          </section>
        </aside>

        <section class="detail-panel">
          <div id="skill-detail" class="skill-detail">
            <div class="empty-state" data-i18n="select_capability">Select a capability.</div>
          </div>
        </section>
      </section>

      <div id="toast" class="toast" role="status" aria-live="polite" hidden></div>
    </main>
  </body>
</html>
